<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LuxeGlow App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box;font-family:Poppins,Arial}
body{margin:0;background:#f6f6f6}

/* HEADER */
header{
  background:#ff1493;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  position:sticky;
  top:0;
}

/* SECTIONS */
.section{display:none;padding:15px}
.section.active{display:block}

/* BUTTON */
button{
  background:#ff1493;
  color:white;
  border:none;
  padding:14px;
  width:100%;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
}

/* INPUT */
input,select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:20px;
  border:1px solid #ccc;
}

/* LOGIN */
.login-bg{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#ff1493,#ff69b4);
}
.login{
  width:340px;
  background:white;
  padding:30px;
  border-radius:30px;
  box-shadow:0 25px 45px rgba(0,0,0,.25);
  text-align:center;
}
.input-box{position:relative}
.input-box i{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  color:#ff1493;
}
.input-box input{padding-left:45px}

/* CARDS */
#parlourList{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:12px;
}

.card{
  background:white;
  border-radius:20px;
  margin:0;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,.12);
}
.card img{width:100%;height:160px;object-fit:cover}
.card div{padding:12px}
.card h3{margin:0;color:#ff1493}

/* SERVICES */
.services{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:12px;

}
.service{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,.1);
}
.service img{width:100%;height:160px;object-fit:cover}
.service div{padding:8px}

/* PAYMENT */
.amount-box{
  background:white;
  padding:18px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,.12);
  margin-bottom:15px;
}
.amount-box h2{color:#ff1493}

.payment-card{
  background:white;
  border-radius:20px;
  padding:15px;
  margin:12px 0;
  box-shadow:0 6px 15px rgba(0,0,0,.12);
  display:flex;
  gap:15px;
  align-items:center;
  cursor:pointer;
  border:2px solid transparent;
}
.payment-card i{font-size:26px;color:#ff1493}
.payment-card.active{
  border-color:#ff1493;
  background:#fff0f7;
}

/* MISC */
.back{color:#ff1493;font-weight:bold;cursor:pointer;margin-bottom:10px}
.success{text-align:center;color:green;font-weight:bold}
</style>
</head>

<body>

<header>LuxeGlow</header>

<!-- LOGIN -->
<div id="login" class="section active">
  <div class="login-bg">
    <div class="login">
      <h2>Welcome to LuxeGlow</h2>
      <p>Book • Style • Glow ✨</p>

      <div class="input-box">
        <i class="fa fa-user"></i>
        <input id="username" placeholder="Username">
      </div>

      <div class="input-box">
        <i class="fa fa-lock"></i>
        <input id="password" type="password" placeholder="Password">
      </div>

      <button onclick="login()">Login / Register</button>
    </div>
  </div>
</div>

<!-- HOME -->
<div id="home" class="section">
  <h3>Parlours Near You</h3>

  <select id="locationFilter" onchange="loadParlours()">
    <option value="">All Locations</option>
    <option value="Gachibowli">Gachibowli</option>
    <option value="Hitech City">Hitech City</option>
    <option value="Madhapur">Madhapur</option>
    <option value="Banjara Hills">Banjara Hills</option>
  </select>

  <div id="parlourList"></div>
</div>

<!-- SERVICES -->
<div id="servicesPage" class="section">
  <div class="back" onclick="openSection('home')">← Back</div>
  <h3 id="parlourName"></h3>
  <div class="services" id="serviceList"></div>
</div>

<!-- BOOKING -->
<div id="booking" class="section">
  <div class="back" onclick="openSection('servicesPage')">← Back</div>
  <input id="custName" placeholder="Your Name">
  <input type="date" id="date">
  <input type="time" id="time">
  <button onclick="saveBooking()">Continue</button>
</div>

<!-- PAYMENT -->
<div id="payment" class="section">
  <div class="back" onclick="openSection('booking')">← Back</div>

  <div class="amount-box">
    <h4>Payable Amount</h4>
    <h2 id="payAmount"></h2>
    <p id="payService"></p>
  </div>

  <div class="payment-card" onclick="selectPayment('UPI',this)">
    <i class="fa-brands fa-google-pay"></i>
    <div><b>UPI</b><p>GPay • PhonePe • Paytm</p></div>
  </div>

  <div class="payment-card" onclick="selectPayment('Card',this)">
    <i class="fa-regular fa-credit-card"></i>
    <div><b>Card</b><p>Credit / Debit</p></div>
  </div>

  <div id="cardDetails" style="display:none">
    <input placeholder="Card Number">
    <input placeholder="Expiry MM/YY">
    <input placeholder="CVV">
  </div>

  <div class="payment-card" onclick="selectPayment('Cash',this)">
    <i class="fa-solid fa-money-bill-wave"></i>
    <div><b>Cash</b><p>Pay at parlour</p></div>
  </div>

  <button onclick="makePayment()">Pay Securely</button>
</div>

<!-- SUCCESS -->
<div id="success" class="section">
  <h3 class="success">✔ Booking Confirmed</h3>
  <button onclick="openSection('home')">Go Home</button>
</div>

let selectedService={},selectedPayment="";

function openSection(id){
 document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

async function login(){

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

// basic validation
if(!username || !password){
  alert("Please enter username and password");
  return;
}

try{

const res = await fetch("http://localhost:5000/api/auth/login",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({username,password})

});

const data = await res.json();
console.log(data);

openSection("home");
loadParlours();

}catch(err){
console.error(err);
alert("Server not running ❌");
}

}

function loadParlours(){
 parlourList.innerHTML="";
 const loc=locationFilter.value;
 parlours.filter(p=>!loc||p.location===loc).forEach((p,i)=>{
  parlourList.innerHTML+=`
   <div class="card" onclick="openParlour(${i})">
    <img src="${p.img}">
    <div><h3>${p.name}</h3><p>${p.location}</p></div>
   </div>`;
 });
}

function openParlour(i){
 openSection("servicesPage");
 parlourName.innerText=parlours[i].name;
 serviceList.innerHTML="";
 parlours[i].services.forEach(s=>{
  serviceList.innerHTML+=`
   <div class="service" onclick="selectService('${s.name}','${s.price}')">
    <img src="${s.img}">
    <div><b>${s.name}</b><p>${s.price}</p></div>
   </div>`;
 });
}

function selectService(n,p){selectedService={name:n,price:p};openSection("booking");}

async function saveBooking(){

const name=document.getElementById("custName").value;
const date=document.getElementById("date").value;
const time=document.getElementById("time").value;


await fetch("http://localhost:5000/api/booking/save",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
customer:name,
service:selectedService.name,
price:selectedService.price,
date,
time,
payment:selectedPayment
})


});

payService.innerText=selectedService.name;
payAmount.innerText=selectedService.price;

openSection("payment");

}

function selectPayment(p,el){
 selectedPayment=p;
 document.querySelectorAll(".payment-card").forEach(c=>c.classList.remove("active"));
 el.classList.add("active");
 cardDetails.style.display=p==="Card"?"block":"none";
}

function makePayment(){
 if(!selectedPayment) return alert("Select payment method");
 openSection("success");
}
